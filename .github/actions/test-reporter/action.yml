name: 'Test Reporter'
description: 'Generate test summary from Maven Surefire reports'
inputs:
  report-path:
    description: 'Path to surefire reports directory'
    required: true
  report-name:
    description: 'Name for the test report section'
    required: true
    default: 'Test Results'
  search-pattern:
    description: 'Pattern to search for test XML files'
    required: false
    default: 'TEST-*.xml'

runs:
  using: 'composite'
  steps:
    - name: Generate test summary
      if: always()
      shell: bash
      run: |
        cd "${{ inputs.report-path }}"
        
        echo "## ${{ inputs.report-name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Find test report files
        if find . -name "${{ inputs.search-pattern }}" | grep -q .; then
          # Count test results
          TOTAL=$(find . -name "${{ inputs.search-pattern }}" -exec grep -h "tests=" {} \; | sed 's/.*tests="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
          FAILURES=$(find . -name "${{ inputs.search-pattern }}" -exec grep -h "failures=" {} \; | sed 's/.*failures="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
          ERRORS=$(find . -name "${{ inputs.search-pattern }}" -exec grep -h "errors=" {} \; | sed 's/.*errors="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
          SKIPPED=$(find . -name "${{ inputs.search-pattern }}" -exec grep -h "skipped=" {} \; | sed 's/.*skipped="\([0-9]*\)".*/\1/' | awk '{s+=$1} END {print s}')
          PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))
          
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
          
          # Add failure details if any
          if [ $FAILURES -gt 0 ] || [ $ERRORS -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            find . -name "${{ inputs.search-pattern }}" -exec grep -l "<failure\|<error" {} \; | head -5 | while read file; do
              echo "**$(basename $file)**" >> $GITHUB_STEP_SUMMARY
              grep -A 3 "<failure\|<error" "$file" | head -10 >> $GITHUB_STEP_SUMMARY || true
              echo "" >> $GITHUB_STEP_SUMMARY
            done
          fi
        else
          echo "No test reports found" >> $GITHUB_STEP_SUMMARY
        fi

