<style>
.buildtool-tabs {
    margin: 1em 0;
}
.buildtool-tabs .tab-bar {
    display: flex;
    border-bottom: 2px solid #4695EB;
    margin-bottom: 0;
}
.buildtool-tabs .tab-bar button {
    background: #f0f0f0;
    border: 1px solid #ccc;
    border-bottom: none;
    padding: 0.5em 1.5em;
    cursor: pointer;
    font-weight: bold;
    margin-right: 2px;
    border-radius: 4px 4px 0 0;
    font-size: 0.9em;
}
.buildtool-tabs .tab-bar button.active {
    background: #4695EB;
    color: white;
    border-color: #4695EB;
}
.buildtool-tabs .tab-panel {
    display: none;
    border: 1px solid #ccc;
    border-top: none;
    padding: 0.5em 1em;
}
.buildtool-tabs .tab-panel.active {
    display: block;
}
</style>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var mavenBlocks = document.querySelectorAll('.openblock.tab-maven, .sidebarblock.tab-maven');
    mavenBlocks.forEach(function(mavenBlock) {
        var nextSibling = mavenBlock.nextElementSibling;
        if (nextSibling && nextSibling.classList.contains('tab-gradle')) {
            var gradleBlock = nextSibling;
            var container = document.createElement('div');
            container.className = 'buildtool-tabs';
            var tabBar = document.createElement('div');
            tabBar.className = 'tab-bar';
            var mavenBtn = document.createElement('button');
            mavenBtn.textContent = 'Maven';
            mavenBtn.className = 'active';
            mavenBtn.setAttribute('data-tab', 'maven');
            var gradleBtn = document.createElement('button');
            gradleBtn.textContent = 'Gradle';
            gradleBtn.setAttribute('data-tab', 'gradle');
            tabBar.appendChild(mavenBtn);
            tabBar.appendChild(gradleBtn);
            mavenBlock.classList.add('tab-panel', 'active');
            gradleBlock.classList.add('tab-panel');
            mavenBlock.parentNode.insertBefore(container, mavenBlock);
            container.appendChild(tabBar);
            container.appendChild(mavenBlock);
            container.appendChild(gradleBlock);
            [mavenBtn, gradleBtn].forEach(function(btn) {
                btn.addEventListener('click', function() {
                    switchAllTabs(btn.getAttribute('data-tab'));
                });
            });
        }
    });
    function switchAllTabs(tool) {
        localStorage.setItem('preferred-build-tool', tool);
        document.querySelectorAll('.buildtool-tabs').forEach(function(tabs) {
            tabs.querySelectorAll('.tab-bar button').forEach(function(b) {
                b.classList.toggle('active', b.getAttribute('data-tab') === tool);
            });
            tabs.querySelectorAll('.tab-panel').forEach(function(panel) {
                if (panel.classList.contains('tab-' + tool)) {
                    panel.classList.add('active');
                } else {
                    panel.classList.remove('active');
                }
            });
        });
    }
    var saved = localStorage.getItem('preferred-build-tool');
    if (saved) switchAllTabs(saved);
});
</script>
